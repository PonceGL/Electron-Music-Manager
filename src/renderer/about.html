<!-- prettier-ignore -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About</title>
    <link rel="stylesheet" href="./src/index.css" />
  </head>
  <body class="flex h-screen flex-col app-drag">
    <div class="flex flex-1 items-center justify-center">
      <div class="flex flex-col items-center gap-2 p-8 text-center">
        <h1 id="app-name" class="text-[1.6rem] font-bold text-accent">Music Manager</h1>
        <p id="app-version" class="text-[0.85rem] text-subtle"></p>
        <p
          id="app-description"
          class="max-w-[320px] text-[0.95rem] leading-relaxed text-secondary"
        ></p>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search)
      document.getElementById('app-name').textContent = params.get('name') || 'Music Manager'
      const version = params.get('version')
      if (version) document.getElementById('app-version').textContent = 'Version ' + version
      const desc = params.get('description')
      if (desc) document.getElementById('app-description').textContent = desc
    </script>
  </body>
</html>
