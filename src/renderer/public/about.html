<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #1a1a2e;
        color: #eee;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        -webkit-app-region: drag;
      }

      .about-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .about {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-align: center;
        padding: 32px;
      }

      h1 {
        font-size: 1.6rem;
        color: #e94560;
        font-weight: 700;
      }

      .version {
        font-size: 0.85rem;
        color: #888;
      }

      .description {
        font-size: 0.95rem;
        color: #ccc;
        max-width: 320px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="about-wrapper">
      <div class="about">
        <h1 id="app-name">Music Manager</h1>
        <p class="version" id="app-version"></p>
        <p class="description" id="app-description"></p>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search)
      document.getElementById('app-name').textContent = params.get('name') || 'Music Manager'
      const version = params.get('version')
      if (version) document.getElementById('app-version').textContent = 'Version ' + version
      const desc = params.get('description')
      if (desc) document.getElementById('app-description').textContent = desc
    </script>
  </body>
</html>
